# =============================================================================
# General
# =============================================================================

# Tell tmux to use 256 colors. Use "screen-256color" if you see rendering issues.
set -g default-terminal "tmux-256color"
# Enable true color (24-bit) support. Required for Neovim themes to render correctly.
set -as terminal-features ",xterm-256color:RGB"

# Change the prefix key from Ctrl+b to Ctrl+a (closer to your fingers on the keyboard).
# To send a literal Ctrl+a to the terminal (e.g. in bash), press Ctrl+a twice.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reduce the delay after pressing Escape. Default is 500ms which causes noticeable
# lag when exiting insert mode in Vim/Neovim. 10ms is safe; you can set it to 0.
set -sg escape-time 10

# Forward focus events (e.g. when tmux gains/loses focus) to the running application.
# Required for Vim's autoread and some plugins to work correctly.
set -g focus-events on

# Number of lines kept in the scrollback buffer per pane.
# Increase if you need more history; decrease to save RAM.
set -g history-limit 50000

# How long (ms) status bar messages (like "Config reloaded!") stay visible.
set -g display-time 2000

# Enable mouse support: click to select pane/window, scroll to navigate history.
# Set to "off" if you prefer to keep terminal text selection behavior.
set -g mouse on

# Start window and pane numbering at 1 instead of 0.
# This makes <prefix> 1 jump to the first window, which matches the keyboard layout.
set -g base-index 1
setw -g pane-base-index 1

# Automatically re-number windows when one is closed, keeping them sequential.
set -g renumber-windows on

# Update the terminal emulator's title bar with the current session and window name.
# Variables: #S = session name, #W = window name, #T = pane title, #I = window index.
set -g set-titles on
set -g set-titles-string "#S · #W"

# =============================================================================
# Key bindings
# =============================================================================
# All bindings below require pressing the prefix key first (Ctrl+a by default),
# unless the -n flag is used (which means "no prefix needed").

# Reload this config file without restarting tmux. Useful after making changes.
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split the current pane into two side-by-side panes (horizontal split).
# -c "#{pane_current_path}" opens the new pane in the same directory.
bind | split-window -h -c "#{pane_current_path}"

# Split the current pane into two stacked panes (vertical split).
bind - split-window -v -c "#{pane_current_path}"

# Remove the default split bindings (% and ") since | and - replace them.
unbind '"'
unbind %

# Navigate between panes using h/j/k/l, just like moving in Vim.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize the current pane in steps of 5 cells using capital H/J/K/L.
# The -r flag means the key can be repeated without pressing the prefix again
# (within the repeat-time window, default 500ms).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Copy mode (vi keys)
# =============================================================================

# Use vi key bindings inside copy mode (the scrollback viewer).
# Alternative: "emacs" for Emacs-style bindings.
setw -g mode-keys vi

# Enter copy mode with <prefix> Enter (instead of <prefix> [).
bind Enter copy-mode

# Once in copy mode:
#   v — start a visual selection (like Vim's visual mode)
#   y — yank (copy) the selection and exit copy mode
# To paste, use <prefix> ] as usual.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# Status bar
# =============================================================================

# How often (seconds) the status bar refreshes.
# Lower values keep the clock and dynamic content more accurate.
set -g status-interval 5

# Show the status bar at the bottom. Change to "top" if you prefer it there.
set -g status-position bottom

# Align window list to the left. Options: left | centre | right.
set -g status-justify left

# Overall status bar colors (background and foreground).
# Uses hex colors — change these to match your terminal theme.
# Current theme: Catppuccin Mocha (#1e1e2e background, #cdd6f4 text).
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left side of the status bar: shows the session name in bold.
# #S = session name. Increase status-left-length if your session names are long.
set -g status-left " #[bold]#S #[nobold]│ "
set -g status-left-length 20

# Right side of the status bar: shows current time and date.
# Uses strftime format: %H:%M = 24h clock, %d %b = day and month abbreviation.
set -g status-right " %H:%M  %d %b "
set -g status-right-length 30

# Format for inactive windows in the window list.
# #I = window index, #W = window name.
set -g window-status-format         " #I:#W "

# Format for the currently active window (highlighted).
set -g window-status-current-format " #[bold]#I:#W #[nobold]"

# Color of the active window label. Change the hex to any color you like.
set -g window-status-current-style  "fg=#89b4fa,bold"

# =============================================================================
# Cheatsheet popup
# =============================================================================

# <prefix> ? — show a floating cheatsheet of all keybindings.
# Press q or Escape to close it. Overrides tmux's built-in key list.
unbind ?
bind ? display-popup -E -w 66 -h 36 "sh ~/.config/tmux/cheatsheet.sh | less -R"
